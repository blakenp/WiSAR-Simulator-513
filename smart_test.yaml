world:
  x_length: 40.0
  y_length: 40.0
  num_x_pts: 40
  num_y_pts: 40

timekeeper:
  step: 0
  time_step_seconds: 0.1

simulation:
  time_limit_seconds: 90.0
  step_time_seconds: 0.1

agents:
  - id: "uav_1"
    type: "direct_path_finder_agent"
    x: 2.0
    y: 2.0
    traversable_hazards: ["standing_water", "undergrowth"]
    speed_mps: 1.5
    belief:
      type: "point"
      target_x: 26.0
      target_y: 26.0

  - id: "uav_2"
    type: "direct_path_finder_agent"
    x: 4.0
    y: 2.0
    traversable_hazards: ["standing_water", "undergrowth"]
    speed_mps: 1.5
    belief:
      type: "point"
      target_x: 27.0
      target_y: 27.0

targets:
  - id: "target_0"
    type: "smart_target"
    x: 26.0
    y: 26.0
    value: 100.0
    traversable_hazards: ["tree", "standing_water", "undergrowth", "running_water"]
    heading: 180.0
    speed_mps: 0.0
    max_speed: 1.2
    awareness_radius: 8.0
    nearby_agents: []
    nearby_targets: []
    nearby_hazards: []

  - id: "target_1"
    type: "smart_target"
    x: 27.0
    y: 27.0
    value: 100.0
    traversable_hazards: ["tree", "standing_water", "undergrowth", "running_water"]
    heading: 180.0
    speed_mps: 0.0
    max_speed: 1.2
    awareness_radius: 8.0
    nearby_agents: []
    nearby_targets: []
    nearby_hazards: []

