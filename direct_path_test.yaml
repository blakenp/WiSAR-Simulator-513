world:
  x_length: 20.0
  y_length: 20.0
  num_x_pts: 20
  num_y_pts: 20

timekeeper:
  step: 0
  time_step_seconds: 0.1

simulation:
  time_limit_seconds: 60.0
  step_time_seconds: 0.1

agents:
  - id: "uav_1"
    type: "direct_path_finder_agent"
    x: 1.0
    y: 1.0
    traversable_hazards: ["standing_water", "undergrowth"]
    speed_mps: 1.5
    belief:
      type: "point"
      target_x: 8.5
      target_y: 8.5

targets:
  - id: "target_0"
    type: "evasive_target"
    x: 8.5
    y: 8.5
    value: 100.0
    traversable_hazards: ["tree", "standing_water", "undergrowth"]
    heading: 0.0
    speed_mps: 0.0
    max_speed: 1.2
    awareness_radius: 5.0
    nearby_agents: []
    nearby_targets: []
    nearby_hazards: []

hazards:
  # First wall: vertical line of boulders at x=4, from y=1 to y=6
  # Forces agent to go above y=6 to get around
  - id: "hazard_0"
    x: 4.0
    y: 1.0
    type: "boulder"
  - id: "hazard_1"
    x: 4.0
    y: 2.0
    type: "boulder"
  - id: "hazard_2"
    x: 4.0
    y: 3.0
    type: "boulder"
  - id: "hazard_3"
    x: 4.0
    y: 4.0
    type: "boulder"
  - id: "hazard_4"
    x: 4.0
    y: 5.0
    type: "boulder"
  - id: "hazard_5"
    x: 4.0
    y: 6.0
    type: "boulder"
  # Gap at y=7 and above — agent must pass through there

  # Second wall: horizontal line of trees at y=7, from x=4 to x=7
  # After squeezing through the gap, agent hits this and must go around the right end
  - id: "hazard_6"
    x: 4.0
    y: 7.0
    type: "tree"
  - id: "hazard_7"
    x: 5.0
    y: 7.0
    type: "tree"
  - id: "hazard_8"
    x: 6.0
    y: 7.0
    type: "tree"
  - id: "hazard_9"
    x: 7.0
    y: 7.0
    type: "tree"
  # Gap at x=8 and beyond — agent must curve right to get through

  # Scatter of running_water and undergrowth to add texture and slow pathing options
  - id: "hazard_10"
    x: 6.0
    y: 4.0
    type: "running_water"
  - id: "hazard_11"
    x: 6.0
    y: 5.0
    type: "running_water"
  - id: "hazard_12"
    x: 7.0
    y: 5.0
    type: "running_water"
  - id: "hazard_13"
    x: 2.0
    y: 5.0
    type: "undergrowth"
  - id: "hazard_14"
    x: 3.0
    y: 6.0
    type: "undergrowth"
  - id: "hazard_15"
    x: 5.0
    y: 9.0
    type: "boulder"
  - id: "hazard_16"
    x: 6.0
    y: 9.0
    type: "boulder"